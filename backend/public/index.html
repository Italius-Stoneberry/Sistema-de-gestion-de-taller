<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Taller</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- ================== LOGIN ================== -->
  <section id="vista-login" class="pantalla">
    <form id="form-login" class="card">
      <h1>Gestión de Taller</h1>
      <label>Email <input type="email" id="login-email" required /></label>
      <label>Contraseña <input type="password" id="login-password" required /></label>
      <button type="submit">Ingresar</button>
      <p id="login-error" class="error"></p>
    </form>
  </section>

  <!-- ================== APP ================== -->
  <div id="app" class="oculto">
    <header class="barra">
      <strong>Gestión de Taller</strong>
      <nav id="menu"></nav>
      <span class="spacer"></span>
      <span id="usuario-actual"></span>
      <button id="btn-salir" class="link">Salir</button>
    </header>
    <main id="contenido"></main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
