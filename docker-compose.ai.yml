# =========================================================================
# STACK DE IA (OPCIONAL) — activar solo cuando el equipo tenga RAM y GPU.
# Levantar junto con el principal:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d
#
# Incluye:
#   - ollama : LLM local (usa la GPU NVIDIA). Modelo sugerido: qwen3:14b o gemma3:12b
#   - whisper: transcripción de audios de WhatsApp (API HTTP)
#   - n8n    : orquestador de flujos (WhatsApp/correo -> IA -> tu API)
#   - waha   : puente de WhatsApp (WhatsApp HTTP API) self-hosted
# =========================================================================
services:
  ollama:
    image: ollama/ollama:latest
    container_name: taller-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # --- GPU NVIDIA: requiere nvidia-container-toolkit instalado en el host ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    expose:
      - "11434"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: taller-whisper
    restart: unless-stopped
    environment:
      ASR_MODEL: small        # tiny/base/small/medium — small anda bien y liviano
      ASR_ENGINE: faster_whisper
    expose:
      - "9000"

  n8n:
    image: n8nio/n8n:latest
    container_name: taller-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      # Nombre interno de servicios para usar dentro de los flujos:
      #   API de la app:  http://app:3000
      #   Ollama:         http://ollama:11434
      #   Whisper:        http://whisper:9000
      #   WAHA:           http://waha:3000
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"     # panel de n8n (accedelo por Tailscale, no lo abras a internet)

  waha:
    image: devlikeapro/waha:latest
    container_name: taller-waha
    restart: unless-stopped
    volumes:
      - waha_data:/app/.sessions
    ports:
      - "3001:3000"     # panel de WAHA para vincular el WhatsApp (escaneo de QR)

volumes:
  ollama_data:
  whisper_data:
  n8n_data:
  waha_data:
