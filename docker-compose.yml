services:
  db:
    image: postgres:16-alpine
    container_name: taller-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # La base NO expone puertos a la red: solo la usa el backend por la red interna de Docker.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: taller-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      INGEST_API_KEY: ${INGEST_API_KEY}
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:14b}
      AUTORIZADOS: ${AUTORIZADOS:-}
      # Para bajar imágenes que llegan por WhatsApp (fotos de cheques, referencias, etc.)
      WAHA_URL: ${WAHA_URL:-http://host.docker.internal:3001}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      UPLOADS_DIR: /app/uploads
      ADMIN_NOMBRE: ${ADMIN_NOMBRE}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Se accede desde la red del taller/casa y por Tailscale: http://<ip-del-nas>:3000
      - "3000:3000"
    volumes:
      # Frontend en vivo: cambios visuales con solo `git pull` (sin reconstruir la imagen)
      - ./backend/public:/app/public
      # Imágenes adjuntas (persisten entre rebuilds)
      - uploads:/app/uploads

volumes:
  db_data:
  uploads:
